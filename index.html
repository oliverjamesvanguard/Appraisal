<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Appraisal">
<title>Appraisal – Oliver Robinson</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --ink: #1a1a1a;
        --rule: #2a2a2a;
        --pale: #f5f3ee;
        --cream: #fffdf7;
        --gold: #b8960c;
        --big: 26px;
        --bigger: 32px;
        --biggest: 42px;
    }

    body {
        font-family: 'Source Sans 3', Arial, sans-serif;
        background: var(--pale);
        color: var(--ink);
        padding: 20px 16px 80px;
        font-size: var(--big);
        -webkit-text-size-adjust: 100%;
    }

    .page {
        max-width: 900px;
        margin: 0 auto;
        background: var(--cream);
        border: 3px solid var(--rule);
        padding: 36px 28px 56px;
        box-shadow: 6px 6px 0 #ccc8be;
        border-radius: 6px;
    }

    /* ── Header ── */
    header {
        text-align: center;
        border-bottom: 4px double var(--rule);
        padding-bottom: 24px;
        margin-bottom: 32px;
    }
    header h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: clamp(60px, 14vw, 100px);
        font-weight: 900;
        letter-spacing: 0.08em;
        line-height: 1;
    }
    header p {
        font-size: clamp(18px, 4vw, 24px);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #555;
        margin-top: 8px;
    }

    /* ── Section titles ── */
    h2.section-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.06em;
        border-bottom: 2px solid var(--rule);
        padding-bottom: 8px;
        margin: 36px 0 20px;
    }

    /* ── Items table ── */
    .items-table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--big);
    }
    .items-table th {
        background: var(--ink);
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 15px;
        padding: 14px 10px;
        text-align: left;
    }
    .items-table td {
        border-bottom: 2px solid #d0ccc4;
        padding: 10px 6px;
        vertical-align: middle;
    }
    .items-table tr:nth-child(even) td { background: #f9f7f2; }

    /* ── All inputs ── */
    input[type="text"],
    input[type="number"],
    textarea {
        font-family: 'Source Sans 3', Arial, sans-serif;
        font-size: var(--big);
        color: var(--ink);
        background: transparent;
        border: none;
        border-bottom: 2px dashed #aaa;
        width: 100%;
        padding: 8px 4px;
        outline: none;
        -webkit-appearance: none;
        border-radius: 0;
        line-height: 1.3;
    }
    input[type="number"] { text-align: right; }
    input:focus, textarea:focus {
        border-bottom-color: var(--gold);
        background: #fffbe8;
    }
    input[readonly] {
        border-bottom-style: solid;
        border-bottom-color: #bbb;
        color: #222;
        font-weight: 700;
        background: transparent !important;
    }

    /* ── Col widths ── */
    .col-desc  { width: 48%; }
    .col-unit  { width: 22%; }
    .col-total { width: 22%; }
    .col-del   { width: 8%; }

    /* ── Buttons ── */
    .add-row-btn {
        display: block;
        margin: 14px 0 0;
        background: none;
        border: 2px dashed #aaa;
        color: #666;
        font-size: 20px;
        letter-spacing: 0.06em;
        padding: 12px 20px;
        cursor: pointer;
        border-radius: 4px;
        font-family: inherit;
        -webkit-appearance: none;
        width: 100%;
    }
    .add-row-btn:active { border-color: var(--gold); color: var(--gold); }

    .del-btn {
        background: none;
        border: none;
        color: #ccc;
        font-size: 28px;
        cursor: pointer;
        padding: 0 6px;
        line-height: 1;
        font-family: inherit;
        -webkit-appearance: none;
    }
    .del-btn:active { color: #c00; }

    /* ── Totals ── */
    .totals-block {
        margin-top: 28px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }
    .totals-row {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 16px;
        font-size: var(--bigger);
        font-weight: 600;
    }
    .totals-row label {
        color: #555;
        white-space: nowrap;
        font-size: var(--big);
    }
    .totals-row .pound { font-weight: 700; }
    .totals-row input {
        width: 180px;
        font-size: var(--bigger);
        font-weight: 700;
        text-align: right;
    }

    .original-box {
        border: 3px dashed #999;
        border-radius: 8px;
        padding: 18px 20px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 14px;
        font-size: var(--biggest);
        font-weight: 800;
        margin-top: 8px;
        background: #f7f5ef;
    }
    .original-box label { color: #444; white-space: nowrap; font-size: var(--bigger); }
    .original-box input {
        width: 200px;
        font-size: var(--biggest);
        font-weight: 800;
        text-align: right;
    }

    /* ── Discounts ── */
    .disc-table {
        width: 100%;
        border-collapse: collapse;
        font-size: var(--big);
    }
    .disc-table td {
        padding: 10px 6px;
        border-bottom: 2px solid #e0ddd6;
        vertical-align: middle;
    }
    .disc-table .disc-desc { width: 52%; }
    .disc-table .disc-amt  { width: 38%; text-align: right; font-weight: 700; }
    .disc-table .disc-del  { width: 10%; text-align: center; }
    .disc-table .disc-amt input {
        width: 160px;
        font-size: var(--big);
        font-weight: 700;
        text-align: right;
    }

    /* ── Final price ── */
    .final-price-box {
        margin: 36px 0 0;
        border: 4px solid var(--ink);
        border-radius: 10px;
        background: #fffbe8;
        padding: 28px 20px;
        text-align: center;
        box-shadow: 5px 5px 0 #ccc8be;
    }
    .final-price-box .label {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: clamp(22px, 5vw, 32px);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #555;
        margin-bottom: 10px;
    }
    .final-price-box input {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: clamp(52px, 14vw, 86px);
        font-weight: 900;
        text-align: center;
        border: none;
        border-bottom: 4px solid var(--ink);
        width: 100%;
        background: transparent;
        color: var(--ink);
        letter-spacing: 0.04em;
        -webkit-appearance: none;
    }

    /* ── Approved / payment ── */
    .approved-row, .payment-section { margin-top: 36px; }
    .field-label {
        display: block;
        font-size: 14px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #666;
        margin-bottom: 8px;
        font-weight: 700;
    }
    .approved-row input {
        font-size: var(--bigger);
        font-weight: 700;
        width: 100%;
        max-width: 400px;
    }
    .payment-section textarea {
        font-size: var(--big);
        width: 100%;
        resize: vertical;
        border: 2px dashed #aaa;
        padding: 14px;
        border-radius: 6px;
        background: transparent;
        line-height: 1.5;
    }
    .payment-section textarea:focus { border-color: var(--gold); outline: none; }

    /* ── Sig line ── */
    .sig-line {
        margin-top: 56px;
        display: flex;
        flex-wrap: wrap;
        gap: 40px;
        border-top: 2px solid #ccc;
        padding-top: 24px;
        font-size: 16px;
        letter-spacing: 0.1em;
        color: #555;
        text-transform: uppercase;
        font-weight: 600;
    }
    .sig-line .sig-field { flex: 1 1 180px; }
    .sig-line .sig-field span {
        display: block;
        border-bottom: 2px solid #aaa;
        margin-top: 44px;
    }

    /* ── Action buttons ── */
    .action-btns {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-top: 40px;
    }
    .print-btn {
        background: var(--ink);
        color: #fff;
        font-family: inherit;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 18px 32px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        -webkit-appearance: none;
        width: 100%;
    }
    .print-btn:active { background: #333; }

    .reset-btn {
        background: #fff;
        color: #c00;
        border: 3px solid #c00;
        font-family: inherit;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 18px 32px;
        border-radius: 6px;
        cursor: pointer;
        -webkit-appearance: none;
        width: 100%;
    }
    .reset-btn:active { background: #c00; color: #fff; }

    @media print {
        body { background: #fff; padding: 0; font-size: 20px; }
        .page { border: none; box-shadow: none; padding: 20px; max-width: 100%; }
        .add-row-btn, .print-btn, .reset-btn, .del-btn, .action-btns { display: none; }
        input, textarea { border-bottom-style: solid !important; border-bottom-color: #ccc !important; }
    }
</style>
</head>
<body>
<div class="page">

    <header>
        <h1>APPRAISAL</h1>
        <p>Chartered Surveyor &nbsp;·&nbsp; Oliver Robinson</p>
    </header>

    <h2 class="section-title">Itemised Costs</h2>
    <table class="items-table" id="itemsTable">
        <thead>
            <tr>
                <th class="col-desc">Description</th>
                <th class="col-unit">Unit Price (£)</th>
                <th class="col-total">Total (£)</th>
                <th class="col-del"></th>
            </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
    </table>
    <button class="add-row-btn" onclick="addRow()">+ Add line item</button>

    <div class="totals-block">
        <div class="totals-row">
            <label>Subtotal</label>
            <span class="pound">£</span>
            <input id="subtotal" type="text" readonly placeholder="0.00">
        </div>
        <div class="totals-row">
            <label>VAT (£)</label>
            <span class="pound">£</span>
            <input id="vat" type="number" min="0" step="0.01" placeholder="0.00" oninput="calculateTotals()">
        </div>
        <div class="original-box">
            <label>Original Total</label>
            <span class="pound">£</span>
            <input id="originalTotal" type="text" readonly placeholder="0.00">
        </div>
    </div>

    <h2 class="section-title" style="margin-top:44px">Surveyor Approved Discounts</h2>
    <table class="disc-table">
        <tbody id="discBody"></tbody>
    </table>
    <button class="add-row-btn" onclick="addDiscount()">+ Add discount</button>

    <div class="final-price-box">
        <div class="label">Final Price</div>
        <input id="finalPrice" type="text" readonly placeholder="0.00">
    </div>

    <div class="approved-row">
        <span class="field-label">Approved by</span>
        <input type="text" placeholder="Oliver Robinson">
    </div>

    <div class="payment-section">
        <span class="field-label">Payment Terms</span>
        <textarea rows="4" placeholder="Enter payment terms…"></textarea>
    </div>

    <div class="sig-line">
        <div class="sig-field">Customer Signature<span>&nbsp;</span></div>
        <div class="sig-field">Date<span>&nbsp;</span></div>
    </div>

    <div class="action-btns">
        <button class="print-btn" onclick="window.print()">🖨 Print / Save PDF</button>
        <button class="reset-btn" onclick="resetForm()">↺ Clear Form</button>
    </div>

</div>

<script>
function fmt(n) { return (isNaN(n) ? 0 : Math.max(0, n)).toFixed(2); }

function addRow() {
    const tbody = document.getElementById('itemsBody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td class="col-desc"><input type="text" placeholder="Description"></td>
        <td class="col-unit"><input type="number" min="0" step="0.01" placeholder="0.00" oninput="calcRow(this)"></td>
        <td class="col-total"><input type="text" readonly placeholder="0.00"></td>
        <td class="col-del"><button class="del-btn" onclick="delRow(this)">×</button></td>`;
    tbody.appendChild(tr);
}

function delRow(btn) {
    btn.closest('tr').remove();
    calculateTotals();
}

function calcRow(el) {
    const row = el.closest('tr');
    const unit = parseFloat(el.value) || 0;
    row.cells[2].querySelector('input').value = fmt(unit);
    calculateTotals();
}

function addDiscount() {
    const tbody = document.getElementById('discBody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td class="disc-desc"><input type="text" placeholder="Discount description"></td>
        <td class="disc-amt">– £<input type="number" min="0" step="0.01" placeholder="0.00" oninput="calculateFinal()"></td>
        <td class="disc-del"><button class="del-btn" onclick="delDisc(this)">×</button></td>`;
    tbody.appendChild(tr);
}

function delDisc(btn) {
    btn.closest('tr').remove();
    calculateFinal();
}

function calculateTotals() {
    let sub = 0;
    document.querySelectorAll('#itemsBody .col-total input').forEach(i => {
        sub += parseFloat(i.value) || 0;
    });
    document.getElementById('subtotal').value = fmt(sub);
    const vat = parseFloat(document.getElementById('vat').value) || 0;
    document.getElementById('originalTotal').value = fmt(sub + vat);
    calculateFinal();
}

function calculateFinal() {
    const orig = parseFloat(document.getElementById('originalTotal').value) || 0;
    let disc = 0;
    document.querySelectorAll('#discBody input[type="number"]').forEach(i => {
        disc += parseFloat(i.value) || 0;
    });
    document.getElementById('finalPrice').value = fmt(orig - disc);
}

function resetForm() {
    if (!confirm('Clear everything and start a new appraisal?')) return;
    document.getElementById('itemsBody').innerHTML = '';
    document.getElementById('discBody').innerHTML = '';
    document.getElementById('vat').value = '';
    document.querySelectorAll('input[type="text"]:not([readonly]), textarea').forEach(i => i.value = '');
    addRow(); addRow(); addRow();
    addDiscount(); addDiscount();
    calculateTotals();
}

addRow(); addRow(); addRow();
addDiscount(); addDiscount();
calculateTotals();
</script>
</body>
</html>
